<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>无障碍出行伴侣 · 城市版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/graphlib@2.1.8/dist/graphlib.min.js"></script>
</head>
<body>
<div id="map"></div>

<!-- 顶部状态栏 -->
<div id="status">
    <span id="statusText">👋 欢迎使用无障碍出行伴侣</span>
    <div class="status-actions">
        <button id="pauseResumeBtn" title="暂停/继续播报">⏸️</button>
        <button id="stopSpeakBtn" title="停止播报">⏹️</button>
    </div>
</div>

<!-- 左侧面板区 -->
<div class="left-panel">
    <!-- 搜索卡片 -->
    <div class="glass-card search-card">
        <div class="input-row">
            <div class="autocomplete-wrapper">
                <input type="text" id="startAddress" placeholder="起点（例如：西门）" autocomplete="off">
                <div id="startSuggestions" class="autocomplete-items"></div>
            </div>
            <div class="arrow">↓</div>
            <div class="autocomplete-wrapper">
                <input type="text" id="endAddress" placeholder="终点（例如：图书馆）" autocomplete="off">
                <div id="endSuggestions" class="autocomplete-items"></div>
            </div>
        </div>
        <div class="btn-row">
            <button id="searchRouteBtn" class="btn-primary">🔍 规划</button>
            <button id="clearRouteBtn" class="btn-danger">🗑️ 清除</button>
        </div>
        <div class="options-row">
            <label class="wheelchair-label">
                <input type="checkbox" id="wheelchairModeSearch" checked> ♿ 轮椅优先
            </label>
            <button id="useMyLocationBtn" class="text-btn">📍 我的位置</button>
        </div>
        <div class="pref-wrapper">
            <button id="showPrefBtn" class="text-btn">⚙️ 偏好</button>
            <div id="prefDropdown">
                <div class="pref-title">🚀 路径规划偏好</div>
                <div class="pref-item">
                    <label>📈 坡道偏好</label>
                    <input type="checkbox" id="rampPrefer">
                </div>
                <div class="pref-item">
                    <label>🚫 避开障碍:</label>
                    <div class="obstacle-types">
                        <label><input type="checkbox" value="台阶" class="avoid-type"> 台阶</label>
                        <label><input type="checkbox" value="坡道损坏" class="avoid-type"> 坡道损坏</label>
                        <label><input type="checkbox" value="盲道被占" class="avoid-type"> 盲道被占</label>
                        <label><input type="checkbox" value="电梯故障" class="avoid-type"> 电梯故障</label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 功能按钮卡片 -->
    <div class="glass-card action-card">
        <div class="action-grid">
            <button id="voiceBtn" class="action-btn voice-btn">🎤 语音</button>
            <button id="sosBtn" class="action-btn sos-btn">🆘 SOS</button>
            <button id="reportBtn" class="action-btn">📝 上报</button>
            <a href="admin.html" target="_blank" class="action-btn">⚙️ 管理</a>
            <button id="locateBtn" class="action-btn">📍 定位</button>
            <a href="user.html" id="userCenterBtn" class="action-btn">👤 我的</a>
        </div>
        <span id="userStatus" class="user-status-text"></span>
    </div>

    <!-- 底部工具条 -->
    <div class="bottom-tools">
        <button id="statsBtn" class="tool-btn">📊 数据看板</button>
        <button id="clearDataBtn" class="tool-btn">🗑️ 清除数据</button>
    </div>
</div>

<!-- 右侧设施面板（可折叠） -->
<div id="facilityPanel" class="facility-panel compact">
    <div class="panel-header" id="facilityPanelHeader">
        <span>🏢 实时设施状态</span>
        <span id="facilityToggleIcon">▼</span>
    </div>
    <div id="facilityList"></div>
</div>

<!-- 障碍上报模态框 -->
<div id="reportModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="closeReportModal">&times;</span>
        <h3>📝 上报障碍物</h3>
        <div id="reportLocationInfo">
            <strong>📍 障碍物所在地点：</strong><br>
            <span id="reportLocationName">正在获取位置...</span><br>
            <span id="reportLocationCoords"></span>
        </div>
        <form id="reportForm">
            <label>障碍类型：</label>
            <select id="obstacleType" required>
                <option value="台阶">台阶</option>
                <option value="坡道损坏">坡道损坏</option>
                <option value="盲道被占">盲道被占</option>
                <option value="电梯故障">电梯故障</option>
                <option value="其他">其他</option>
            </select>
            <label>描述（选填）：</label>
            <input type="text" id="obstacleDesc" placeholder="例如：图书馆门口三级台阶">
            <label>拍照上传：</label>
            <input type="file" id="obstaclePhoto" accept="image/*" capture="environment">
            <img id="photoPreview" style="display:none; max-width:100%; max-height:200px; margin-top:8px; border-radius:12px;">
            <input type="hidden" id="obstacleLat">
            <input type="hidden" id="obstacleLng">
            <p id="locationHint">📍 将使用当前地图中心位置</p>
            <button type="submit" class="btn-primary">提交上报</button>
        </form>
    </div>
</div>

<!-- SOS 求助模态框（新增） -->
<div id="sosModal" class="modal">
    <div class="modal-content" style="max-width: 420px;">
        <span class="close-btn" id="closeSosModal">&times;</span>
        <h3>🆘 紧急求助</h3>
        <div id="sosLocationInfo" style="background: #f0f7ff; padding: 12px; border-radius: 16px; margin-bottom: 15px; font-size: 13px;">
            <strong>📍 您的位置：</strong><br>
            <span id="sosAddress">正在获取...</span>
        </div>
        <div class="form-group">
            <label>💬 求助详情（可选）</label>
            <textarea id="sosMessage" rows="3" placeholder="请描述您需要什么帮助…" style="width:100%; padding:12px; border:1px solid #e0e0e0; border-radius:16px; font-size:14px; resize:vertical;"></textarea>
        </div>
        <button id="confirmSosBtn" class="btn-primary" style="margin-top: 10px; background: #ff3b30;">🚨 立即发送 SOS</button>
    </div>
</div>

<!-- 语音指令提示面板 -->
<div id="voiceHintPanel" class="voice-hint">
    <div class="hint-header">
        <h4>🎤 您可以这样说</h4>
        <button onclick="document.getElementById('voiceHintPanel').style.display='none'">&times;</button>
    </div>
    <div class="hint-tags">
        <span class="voice-cmd" onclick="document.getElementById('endAddress').value='图书馆'; speak('导航到图书馆'); planRealRoute();">📖 导航到图书馆</span>
        <span class="voice-cmd" onclick="document.getElementById('endAddress').value='食堂'; speak('导航到食堂'); planRealRoute();">🍜 导航到食堂</span>
        <span class="voice-cmd" onclick="speak('附近的电梯'); queryFacility('电梯')">🛗 找电梯</span>
        <span class="voice-cmd" onclick="speak('附近的坡道'); queryFacility('坡道')">♿ 找坡道</span>
        <span class="voice-cmd" onclick="speak('我要去西门'); executeNavigate('西门')">🚪 去西门</span>
    </div>
    <p class="hint-footer">点击标签快速执行，或直接说出指令</p>
</div>

<script src="app.js"></script>
<script>
    // 设施面板折叠
    document.getElementById('facilityPanelHeader').addEventListener('click', () => {
        const list = document.getElementById('facilityList');
        const icon = document.getElementById('facilityToggleIcon');
        const panel = document.getElementById('facilityPanel');
        if (list.style.display === 'none' || !list.style.display) {
            list.style.display = 'block';
            icon.textContent = '▲';
            panel.classList.remove('compact');
        } else {
            list.style.display = 'none';
            icon.textContent = '▼';
            panel.classList.add('compact');
        }
    });
    // 偏好弹出
    document.getElementById('showPrefBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        const dropdown = document.getElementById('prefDropdown');
        dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
    });
    document.addEventListener('click', (e) => {
        if (!e.target.closest('#prefDropdown') && !e.target.closest('#showPrefBtn')) {
            document.getElementById('prefDropdown').style.display = 'none';
        }
    });
</script>
</body>
<!-- 图片放大模态框 -->
<div id="imageModal" class="image-modal">
    <span class="image-modal-close">&times;</span>
    <img class="image-modal-content" id="modalImage">
</div>
</html>
