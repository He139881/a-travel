<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 无障碍出行</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 80px auto;
            padding: 30px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .login-container h2 {
            text-align: center;
            color: #007aff;
            margin-bottom: 24px;
        }

        .tab-bar {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid #ddd;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: 500;
            color: #666;
        }

        .tab.active {
            color: #007aff;
            border-bottom: 2px solid #007aff;
        }

        .login-form {
            display: block;
        }

        .login-form.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .error-msg {
            color: #ff3b30;
            margin-top: 10px;
            text-align: center;
        }

        .register-link {
            text-align: center;
            margin-top: 16px;
            color: #666;
        }

        .register-link a {
            color: #007aff;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h2>无障碍出行</h2>
        <div class="tab-bar">
            <div class="tab active" data-role="user">用户登录</div>
            <div class="tab" data-role="admin">管理员登录</div>
        </div>

        <!-- 用户登录表单 -->
        <form id="userLoginForm" class="login-form">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="userUsername" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="userPassword" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn-login">登 录</button>
            <div class="register-link">
                还没有账号？<a href="#" id="showRegisterBtn">立即注册</a>
            </div>
        </form>

        <!-- 管理员登录表单 -->
        <form id="adminLoginForm" class="login-form hidden">
            <div class="form-group">
                <label>管理员账号</label>
                <input type="text" id="adminUsername" placeholder="请输入管理员账号" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="adminPassword" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn-login">登 录</button>
        </form>

        <!-- 注册表单（弹窗式） -->
        <div id="registerModal" class="modal" style="display: none;">
            <div class="modal-content" style="max-width: 400px;">
                <span class="close-btn" id="closeRegisterModal">&times;</span>
                <h3>用户注册</h3>
                <form id="registerForm">
                    <div class="form-group">
                        <label>用户名 *</label>
                        <input type="text" id="regUsername" required>
                    </div>
                    <div class="form-group">
                        <label>密码 *</label>
                        <input type="password" id="regPassword" required>
                    </div>
                    <div class="form-group">
                        <label>昵称</label>
                        <input type="text" id="regNickname">
                    </div>
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="tel" id="regPhone">
                    </div>
                    <button type="submit" class="btn-login">注 册</button>
                </form>
            </div>
        </div>

        <div id="loginError" class="error-msg"></div>
    </div>

    <script>
       const API_BASE = 'http://localhost:3000/api';
        let currentRole = 'user'; // 'user' 或 'admin'

        // 标签切换
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentRole = tab.dataset.role;
                document.getElementById('userLoginForm').classList.toggle('hidden', currentRole !== 'user');
                document.getElementById('adminLoginForm').classList.toggle('hidden', currentRole === 'user');
                document.getElementById('loginError').innerText = '';
            });
        });

        // 用户登录
        document.getElementById('userLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('userUsername').value;
            const password = document.getElementById('userPassword').value;

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, isAdmin: false })
                });
                const data = await res.json();
                if (res.ok) {
                    sessionStorage.setItem('token', data.token);
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    document.getElementById('loginError').innerText = data.error;
                }
            } catch (err) {
                document.getElementById('loginError').innerText = '网络错误，请稍后重试';
            }
        });

        // 管理员登录
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, isAdmin: true })
                });
                const data = await res.json();
                if (res.ok) {
                    // 管理员登录成功部分（约第 125 行）
                    sessionStorage.setItem('token', data.token);
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'admin.html';
                } else {
                    document.getElementById('loginError').innerText = data.error;
                }
            } catch (err) {
                document.getElementById('loginError').innerText = '网络错误，请稍后重试';
            }
        });

        // 显示注册模态框
        document.getElementById('showRegisterBtn').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('registerModal').style.display = 'flex';
        });

        // 关闭注册模态框
        document.getElementById('closeRegisterModal').addEventListener('click', () => {
            document.getElementById('registerModal').style.display = 'none';
        });

        // 注册
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const nickname = document.getElementById('regNickname').value;
            const phone = document.getElementById('regPhone').value;

            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, nickname, phone })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('注册成功，请登录');
                    document.getElementById('registerModal').style.display = 'none';
                    document.getElementById('userUsername').value = username; // 自动填入
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert('注册失败，请稍后重试');
            }
        });

        // 检查是否已登录，若已登录则跳转
        (function checkLogin() {
            const token = sessionStorage.getItem('token');
            const user = JSON.parse(sessionStorage.getItem('user') || '{}');
            if (token) {
                if (user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
            }
        })();
    </script>
</body>

</html>
